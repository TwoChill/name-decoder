name: build-apk

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.36" buildozer

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Raise Gradle heap (large video assets OOM the default heap)
        run: |
          mkdir -p ~/.gradle
          # ~/.gradle/gradle.properties takes precedence over p4a's generated project
          # gradle.properties, so this survives p4a re-rendering the dist.
          printf 'org.gradle.jvmargs=-Xmx4096m\n' >> ~/.gradle/gradle.properties

      - name: Build debug APK
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          yes | buildozer -v android debug

      - name: Locate APK
        id: apk
        run: echo "path=$(ls bin/*.apk | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NameDecoder-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Publish APK to a GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="apk-build-${{ github.run_number }}"
          gh release create "$tag" "${{ steps.apk.outputs.path }}" \
            --title "NameDecoder APK (build ${{ github.run_number }})" \
            --notes "Automated debug APK. Download the .apk on your phone and install it (enable 'Install unknown apps' for your browser/file manager)." \
          || gh release upload "$tag" "${{ steps.apk.outputs.path }}" --clobber
